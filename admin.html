<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <style>
        /* Estilos específicos para o Admin ser responsivo */
        .form-card form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-card input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px; /* Evita zoom automático no iOS */
        }

        /* Ajuste do Modal para telas pequenas */
        #modal-editar > div {
            width: 90% !important; /* Ocupa quase toda a largura no celular */
            max-width: 400px;
            border-radius: 15px;
        }

        /* Melhoria na Navbar para telas pequenas */
        @media (max-width: 480px) {
            .navbar {
                padding: 10px 15px;
            }
            .navbar h2 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>

    <header class="navbar">
        <h2>Painel Admin</h2>
        <button id="btn-sair" class="btn danger">Sair</button>
    </header>

    <main class="container">
        <div class="card form-card">
            <h3>Cadastrar Produto</h3>
            <form id="form-cadastrar-produto">
                <input type="text" id="nome-prod" placeholder="Nome do produto" required>
                <input type="number" id="preco-prod" placeholder="Preço" required>
                <input type="number" id="qtd-prod" placeholder="Quantidade" required>
                <input type="text" id="imagem-prod" placeholder="URL da imagem" required>
                <button id="btn-enviar" class="btn" style="width: 100%;">Cadastrar Produto</button>
            </form>
        </div>

        <h2 style="margin-top:30px;">Gerir Produtos</h2>
        <div id="lista-produtos" class="product-grid"></div>

        <div id="modal-editar"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; justify-content:center; align-items:center; padding: 20px;">
            <div class="card" style="background: white; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
                <h3>Editar Produto</h3>
                <form id="form-editar-produto">
                    <input type="hidden" id="edit-id">
                    <input type="text" id="edit-nome" placeholder="Nome" required
                        style="width:100%; margin-bottom:10px; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <input type="number" id="edit-preco" placeholder="Preço" required
                        style="width:100%; margin-bottom:10px; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <input type="number" id="edit-qtd" placeholder="Quantidade" required
                        style="width:100%; margin-bottom:10px; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <input type="text" id="edit-imagem" placeholder="URL Imagem" required
                        style="width:100%; margin-bottom:10px; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    
                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="btn" style="flex: 1;">Salvar</button>
                        <button type="button" class="btn danger" style="flex: 1;"
                            onclick="document.getElementById('modal-editar').style.display='none'">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, rtdb } from "./firebaseConfig.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "login.html"; return; }
            const snap = await get(ref(rtdb, "usuarios/" + user.uid));
            if (!snap.exists() || snap.val().tipo !== "admin") {
                alert("Acesso negado!");
                window.location.href = "index.html";
            } else { iniciarSistema(); }
        });

        function iniciarSistema() {
            const lista = document.getElementById("lista-produtos");
            const modal = document.getElementById("modal-editar");

            onValue(ref(rtdb, "produtos"), (snapshot) => {
                lista.innerHTML = "";
                snapshot.forEach((item) => {
                    const p = item.val();
                    const id = item.key;
                    lista.innerHTML += `
                    <div class="card">
                        <img src="${p.imagem}" style="width:100%; height:150px; object-fit:cover; border-radius:8px;">
                        <h3>${p.nome}</h3>
                        <p>R$ ${p.preco}</p>
                        <p>Stock: ${p.quantidade}</p>
                        <div style="display:grid; gap:5px; margin-top:10px;">
                            <button class="btn" onclick='abrirEditor("${id}", ${JSON.stringify(p).replace(/'/g, "&apos;")})'>Editar</button>
                            <button class="btn danger" onclick="deletar('${id}')">Excluir</button>
                        </div>
                    </div>`;
                });
            });

            window.abrirEditor = (id, p) => {
                document.getElementById('edit-id').value = id;
                document.getElementById('edit-nome').value = p.nome;
                document.getElementById('edit-preco').value = p.preco;
                document.getElementById('edit-qtd').value = p.quantidade;
                document.getElementById('edit-imagem').value = p.imagem;
                modal.style.display = "flex";
            };

            document.getElementById('form-editar-produto').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('edit-id').value;
                await update(ref(rtdb, 'produtos/' + id), {
                    nome: document.getElementById('edit-nome').value,
                    preco: parseFloat(document.getElementById('edit-preco').value),
                    quantidade: parseInt(document.getElementById('edit-qtd').value),
                    imagem: document.getElementById('edit-imagem').value
                });
                modal.style.display = "none";
                alert("Atualizado!");
            };

            document.getElementById('form-cadastrar-produto').onsubmit = async (e) => {
                e.preventDefault();
                await push(ref(rtdb, 'produtos'), {
                    nome: document.getElementById('nome-prod').value,
                    preco: parseFloat(document.getElementById('preco-prod').value),
                    quantidade: parseInt(document.getElementById('qtd-prod').value),
                    imagem: document.getElementById('imagem-prod').value
                });
                e.target.reset();
            };

            window.deletar = (id) => confirm("Excluir?") && remove(ref(rtdb, "produtos/" + id));
            document.getElementById('btn-sair').onclick = () => signOut(auth);
        }
    </script>
</body>

</html>
