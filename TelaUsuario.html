<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lojinha Tech</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="logo">Minha<span>Loja</span></div>
            <ul class="nav-links">
                <li><a href="#">Início</a></li>
                <li><a href="#">Produtos</a></li>
                <li><button id="open-auth" class="btn-login">Minha Conta</button></li>
            </ul>
        </nav>
    </header>

    <section id="auth-section" class="auth-container hidden">
        <div class="auth-card">
            <h2 id="auth-title">Entrar</h2>
            <input type="email" id="email" placeholder="Seu E-mail">
            <input type="password" id="password" placeholder="Sua Senha">
            <button id="btn-action" class="btn-primary">Acessar</button>
            <p id="toggle-auth">Não tem conta? <span>Cadastre-se</span></p>
            <button id="close-auth">Fechar</button>
        </div>
    </section>

    <main class="container">
        <h1>Destaques da Semana</h1>
        <div class="product-grid">
            <div class="product-card">
                <div class="product-image"></div>
                <h3>Fone Bluetooth Pro</h3>
                <p class="price">R$ 199,90</p>
                <button class="btn-buy">Adicionar ao Carrinho</button>
            </div>
            <div class="product-card">
                <div class="product-image"></div>
                <h3>Teclado Mecânico RGB</h3>
                <p class="price">R$ 349,00</p>
                <button class="btn-buy">Adicionar ao Carrinho</button>
            </div>
            <div class="product-card">
                <div class="product-image"></div>
                <h3>Mouse Gamer 16k DPI</h3>
                <p class="price">R$ 120,00</p>
                <button class="btn-buy">Adicionar ao Carrinho</button>
            </div>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>

</html>
