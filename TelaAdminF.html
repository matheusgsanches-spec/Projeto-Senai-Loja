<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin | GERS STORE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">GERS<span>ADMIN</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Ver Loja</a></li>
                <li><button id="btn-sair" class="btn-login" style="background:#ef4444">Sair</button></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2>Gerenciar Inventário (Realtime)</h2>
        
        <form id="form-cadastrar-produto" style="margin-bottom: 40px; background: #fff; padding: 20px; border-radius: 10px;">
            <input type="text" id="nome-prod" placeholder="Nome do Produto" required>
            <input type="number" id="preco-prod" placeholder="Preço" step="0.01" required>
            <input type="number" id="qtd-prod" placeholder="Quantidade" required>
            <input type="file" id="imagem-prod" accept="image/*" required>
            <button type="submit" id="btn-enviar" class="main-button">Cadastrar Produto</button>
        </form>

        <div class="product-grid" id="lista-admin">
            </div>
    </div>

    <script type="module">
        import { auth, rtdb, storage } from "./firebaseConfig.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { ref as sRef, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        import { ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 1. Verificação de Login
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "telaLogin.html";
        });

        // 2. Botão Sair
        document.getElementById('btn-sair').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "telaLogin.html");
        });

        // 3. Cadastro de Produto
        const form = document.getElementById('form-cadastrar-produto');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-enviar');
            
            const nome = document.getElementById('nome-prod').value;
            const preco = parseFloat(document.getElementById('preco-prod').value);
            const qtd = parseInt(document.getElementById('qtd-prod').value);
            const arquivo = document.getElementById('imagem-prod').files[0];

            try {
                btn.disabled = true;
                btn.innerText = "Enviando...";

                // Upload para Storage
                const nomeImg = `${Date.now()}_${arquivo.name}`;
                const imagemRef = sRef(storage, `produtos/${nomeImg}`);
                await uploadBytes(imagemRef, arquivo);
                const url = await getDownloadURL(imagemRef);

                // Salvar no Realtime Database
                const dbRef = ref(rtdb, 'produtos');
                await push(dbRef, {
                    nome: nome,
                    preco: preco,
                    quantidade: qtd,
                    imagem: url,
                    pathStorage: `produtos/${nomeImg}`
                });

                alert("Produto cadastrado!");
                form.reset();
            } catch (error) {
                alert("Erro: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Cadastrar Produto";
            }
        };

        // 4. Listagem em Tempo Real
        const listaAdmin = document.getElementById('lista-admin');
        onValue(ref(rtdb, 'produtos'), (snapshot) => {
            listaAdmin.innerHTML = "";
            const dados = snapshot.val();
            if (dados) {
                Object.keys(dados).forEach((id) => {
                    const p = dados[id];
                    listaAdmin.innerHTML += `
                        <div class="product-card">
                            <img src="${p.imagem}" style="width:100%; height:120px; object-fit:cover;">
                            <h4>${p.nome}</h4>
                            <p>Estoque: <strong>${p.quantidade}</strong></p>
                            <div style="margin: 10px 0;">
                                <button onclick="ajustarEstoque('${id}', ${p.quantidade + 1})">+1</button>
                                <button onclick="ajustarEstoque('${id}', ${p.quantidade - 1})">-1</button>
                            </div>
                            <button onclick="deletarItem('${id}', '${p.pathStorage}')" style="background:red; color:white; border:none; padding:5px; width:100%; cursor:pointer;">Excluir</button>
                        </div>
                    `;
                });
            }
        });

        // Funções Globais
        window.ajustarEstoque = (id, novaQtd) => {
            if (novaQtd < 0) return;
            update(ref(rtdb, `produtos/${id}`), { quantidade: novaQtd });
        };

        window.deletarItem = async (id, path) => {
            if (confirm("Deletar produto?")) {
                try {
                    await remove(ref(rtdb, `produtos/${id}`));
                    if (path) await deleteObject(sRef(storage, path));
                } catch (e) { console.error(e); }
            }
        };
    </script>
</body>
</html>
