<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | GERS STORE</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">GERS<span>ADMIN</span></div>
            <ul class="nav-links">
                <li><button id="btn-logout" class="btn-login" style="background: #ef4444;">Sair</button></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1>Gerenciamento da Loja</h1>
        
        <section class="product-card" style="max-width: 500px; margin: 20px auto; text-align: left;">
            <h3>Cadastrar Novo Produto</h3>
            <form id="form-cadastrar-produto" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                <input type="text" id="nome-prod" placeholder="Nome do Produto" required style="padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                <input type="number" id="preco-prod" placeholder="Preço (Ex: 199.90)" step="0.01" required style="padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                <label style="font-size: 0.8rem; color: #666;">Imagem do Produto:</label>
                <input type="file" id="imagem-prod" accept="image/*" required style="padding: 5px;">
                <button type="submit" id="btn-salvar" class="btn-buy" style="background: #10b981;">Salvar Produto na Vitrine</button>
            </form>
        </section>

        <div class="product-grid">
            <div class="product-card">
                <h3>Relatórios</h3>
                <p>Veja o resumo das suas vendas.</p>
                <button class="btn-buy">Ver Vendas</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, db, storage } from "./firebaseConfig.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        // Importes para Storage e Firestore
        import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Verifica se o usuário está logado
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "telaLogin.html";
            }
        });

        // Botão de Sair
        document.getElementById('btn-logout').onclick = () => {
            signOut(auth).then(() => window.location.href = "telaLogin.html");
        };

        // Lógica de Cadastro de Produto
        const form = document.getElementById('form-cadastrar-produto');
        const btnSalvar = document.getElementById('btn-salvar');

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('nome-prod').value;
            const preco = document.getElementById('preco-prod').value;
            const arquivo = document.getElementById('imagem-prod').files[0];

            if (!arquivo) return;

            btnSalvar.innerText = "Enviando...";
            btnSalvar.disabled = true;

            try {
                // 1. Enviar a imagem para o Firebase Storage
                const storageRef = ref(storage, `produtos/${Date.now()}_${arquivo.name}`);
                await uploadBytes(storageRef, arquivo);
                const urlImagem = await getDownloadURL(storageRef);

                // 2. Salvar os dados (nome, preço, link da imagem) no Firestore
                await addDoc(collection(db, "produtos"), {
                    nome: nome,
                    preco: parseFloat(preco),
                    imagem: urlImagem,
                    dataCriacao: new Date()
                });

                alert("Produto cadastrado com sucesso!");
                form.reset();
            } catch (error) {
                console.error("Erro ao cadastrar:", error);
                alert("Erro ao cadastrar produto. Verifique o console.");
            } finally {
                btnSalvar.innerText = "Salvar Produto na Vitrine";
                btnSalvar.disabled = false;
            }
        };
    </script>
</body>
</html>
