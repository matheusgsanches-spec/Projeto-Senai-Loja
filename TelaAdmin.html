<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Minha Loja</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin-style.css"> </head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">Painel<span>Admin</span></div>
            <ul class="nav-links">
                <li><a href="TelaUsuario.html">Ver Loja</a></li>
                <li><button id="logout-btn" class="btn-logout">Sair</button></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="admin-form-section">
            <h2>Cadastrar Novo Produto</h2>
            <form id="product-form">
                <div class="form-group">
                    <label>Nome do Produto</label>
                    <input type="text" id="prod-name" placeholder="Ex: Smartwatch X" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Preço (R$)</label>
                        <input type="number" id="prod-price" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Quantidade em Estoque</label>
                        <input type="number" id="prod-stock" placeholder="0" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>URL da Imagem</label>
                    <input type="url" id="prod-image" placeholder="https://link-da-foto.com/imagem.jpg" required>
                </div>

                <button type="submit" class="btn-primary">Adicionar Produto</button>
            </form>
        </section>

        <hr class="separator">

        <h2>Gestão de Inventário</h2>
        <div class="admin-product-grid" id="admin-inventory">
            </div>
    </main>

    <script type="module" src="admin-script.js"></script>
</body>
</html>
